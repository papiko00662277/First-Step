<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1f2430">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FirstStep">
<title>FirstStep ― やりたいこと と 最初の一歩</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#1f2430; --sub:#6b7280;
    --line:#e5e7eb; --accent:#3b6ef5; --accent-d:#2b54c7; --good:#1f9d63;
    --soft:#eef2fe; --sidebar:#fbfbfc; --hover:#f2f3f5;
  }
  *{box-sizing:border-box}
  html,body{overflow-x:hidden}
  body{
    margin:0; background:var(--bg); color:var(--ink); -webkit-text-size-adjust:100%;
    font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    line-height:1.6;
  }
  input,textarea,button,select{font-family:inherit}
  input[type=text],input[type=password]{
    width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:2px;
    font-size:16px; background:#fff; color:var(--ink);
  }
  button{border:none; border-radius:2px; cursor:pointer; font-weight:600}
  .primary{background:var(--accent); color:#fff; padding:9px 16px; font-size:14px}
  .primary:hover{background:var(--accent-d)}
  .primary:disabled{opacity:.55; cursor:default}
  .ghost{background:var(--soft); color:var(--accent-d); padding:8px 14px; font-size:13px}
  .hint{font-size:12px; color:var(--sub)}
  .field-label{display:block; font-size:12px; font-weight:700; color:var(--sub); margin:0 0 5px}
  .field{flex:1; min-width:160px}
  .remember{display:flex; align-items:center; gap:7px; margin-top:10px; color:var(--sub); font-size:12px}
  .remember input{width:15px; height:15px; margin:0}
  .error{display:none; color:#b42318; background:#fff1f0; border:1px solid #ffd5d2; border-radius:2px; padding:8px 36px 8px 10px; font-size:13px; margin-top:10px; position:relative}
  .error.show{display:block}
  .error-close{position:absolute; top:5px; right:7px; background:transparent; color:#b42318; padding:2px 6px; font-size:16px; line-height:1; font-weight:700}
  .error-close:hover{background:#ffd5d2}

  /* API gate */
  .api-gate{position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; padding:24px 16px; background:var(--bg)}
  .api-gate.show{display:flex}
  .api-card{width:min(100%,440px); background:#fff; border:1px solid var(--line); padding:22px}
  .api-card h2{font-size:18px; margin:0 0 8px}
  .api-card a{color:var(--accent-d)}
  .api-card .btns{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap}

  /* layout */
  .app-shell{display:none}
  body.api-ready .app-shell{display:flex; min-height:100vh}
  .sidebar{
    width:270px; flex:none; background:var(--sidebar); border-right:1px solid var(--line);
    display:flex; flex-direction:column; padding:16px 12px;
  }
  .brand{font-size:18px; font-weight:700; padding:2px 6px 12px}
  .newbtn{display:flex; align-items:center; gap:8px; width:100%; text-align:left; background:transparent; color:var(--ink);
    padding:9px 10px; font-size:14px; border:1px solid var(--line)}
  .newbtn:hover{background:var(--hover)}
  .side-label{font-size:11px; color:var(--sub); font-weight:700; letter-spacing:.04em; padding:16px 8px 6px}
  .goal-list{flex:1; overflow-y:auto; margin:0 -4px}
  .goal-item{display:flex; align-items:center; gap:6px; padding:8px 8px; cursor:pointer; border-left:2px solid transparent}
  .goal-item:hover{background:var(--hover)}
  .goal-item.active{background:var(--soft); border-left-color:var(--accent)}
  .goal-main{flex:1; min-width:0}
  .goal-title{font-size:13.5px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .goal-sub{font-size:11px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .goal-del{background:transparent; color:var(--sub); padding:2px 6px; font-size:13px; opacity:0; border:none}
  .goal-item:hover .goal-del{opacity:1}
  .goal-del:hover{color:#b42318}
  .side-empty{font-size:12px; color:var(--sub); padding:10px 8px}

  .main{flex:1; min-width:0; padding:22px 26px 60px}
  .main-inner{max-width:820px; margin:0 auto}
  .top-row{display:flex; justify-content:space-between; align-items:flex-start; gap:12px}
  .hero{font-size:28px; font-weight:800; margin:0; letter-spacing:-.01em; line-height:1.1; color:var(--ink)}
  .hero-sub{font-size:13px; color:var(--sub); margin-top:4px; font-weight:500}
  .linkbtn{background:transparent; color:var(--accent-d); padding:0; font-size:12px; font-weight:600; white-space:nowrap}
  .lead{color:var(--sub); font-size:13px; margin:14px 0 18px}

  /* new goal input */
  .newgoal{display:flex; gap:8px; align-items:stretch; margin-bottom:20px; flex-wrap:wrap}
  #newGoal{display:none}
  .newgoal .g-goal{flex:2; min-width:200px}
  .newgoal .g-dl{flex:1; min-width:120px}
  .newgoal .primary{flex:none; white-space:nowrap}

  .detail-title{font-size:17px; font-weight:700; margin:0 0 2px}
  .detail-sub{font-size:12px; color:var(--sub); margin:0 0 14px}
  .empty-note{color:var(--sub); font-size:14px; padding:30px 0}

  /* TODO list (Notion-like, flat) */
  .todo-list{border-top:1px solid var(--line)}
  .todo-card{border-bottom:1px solid var(--line); padding:12px 4px}
  .todo-card:hover{background:#f7f8fa}
  .todo-head{display:flex; gap:12px; align-items:center}
  .todo-check{width:18px; height:18px; flex:none; margin:0; cursor:pointer; accent-color:var(--good)}
  .todo-num{color:var(--sub); font-size:14px; min-width:20px; text-align:right; font-variant-numeric:tabular-nums; user-select:none}
  .todo-head h3{flex:1; font-size:16.5px; font-weight:500; margin:0; cursor:pointer; color:var(--ink)}
  .todo-toggle{background:transparent; color:var(--sub); font-size:10px; padding:4px; width:20px; transition:transform .12s}
  .todo-card.open .todo-toggle{transform:rotate(90deg)}
  .todo-details{display:none; padding:2px 0 10px 46px}
  .todo-card.open .todo-details{display:block}
  .todo-note{color:var(--sub); font-size:13px; margin:0 0 12px}
  .todo-memo{width:100%; min-height:76px; resize:vertical; border:1px solid var(--line); border-radius:2px; padding:8px 10px; font-size:13px; line-height:1.5; color:var(--ink); background:#fff; margin:0 0 10px}
  .memo-label{display:block; color:var(--sub); font-size:12px; font-weight:700; margin:0 0 5px}
  .stepbar{display:flex; align-items:center; gap:8px}
  .step-status{font-size:11px; color:var(--sub)}
  .dev-reset{background:transparent; color:var(--sub); font-size:12px; font-weight:600; margin-left:8px; padding:4px 6px}
  .dev-reset:hover{color:#b42318; background:#fff1f0}
  .todo-card.done h3{text-decoration:line-through; color:var(--sub); font-weight:400}
  .todo-card.done .todo-note{text-decoration:line-through}

  details{margin-top:14px; border-top:1px dashed var(--line); padding-top:10px}
  summary{cursor:pointer; font-weight:600; font-size:13px; color:var(--accent-d)}
  .debug-only{display:none !important}
  body.debug .debug-only{display:block !important}

  /* focus screen */
  #focus{position:fixed; inset:0; background:#10141f; color:#fff; display:none; flex-direction:column;
         align-items:center; justify-content:center; padding:42px 28px 28px; text-align:center; z-index:80}
  #focus.show{display:flex}
  #focus .fs-task{font-size:15px; font-weight:700; color:#cbd3e1; max-width:640px; margin:0 auto 10px}
  #focus .stepnow{font-size:13px; color:#8a93a6; letter-spacing:.08em; margin-bottom:18px}
  #focus .action{font-size:clamp(22px,4.4vw,34px); font-weight:700; line-height:1.45; max-width:760px; margin:0 auto 12px}
  #focus .next-hint{color:#8a93a6; font-size:15px; line-height:1.6; max-width:700px; min-height:24px; margin:0 auto 22px}
  #focus .encouragement{color:#cbd3e1; font-size:14px; min-height:22px; margin-bottom:20px}
  #focus .timer{font-size:clamp(52px,14vw,64px); font-weight:700; font-variant-numeric:tabular-nums; margin:8px 0 4px}
  #focus .timer.done{color:#ffcf6b}
  #focus .timerlabel{color:#8a93a6; font-size:13px; min-height:20px; margin-bottom:26px}
  #focus .fbtns{display:flex; gap:12px; flex-wrap:wrap; justify-content:center}
  #focus .fbtns button{padding:12px 20px; font-size:15px}
  .done-btn{background:var(--good); color:#fff}
  .add-btn{background:#2a3346; color:#cdd4e0}
  .skip-btn{background:transparent; color:#8a93a6; border:1px solid #2a3346}
  #focus .quit{position:absolute; top:16px; right:18px; background:transparent; color:#8a93a6; border:1px solid #2a3346; padding:7px 12px; font-size:12px}

  @media (max-width:760px){
    body.api-ready .app-shell{flex-direction:column; min-height:auto}
    .sidebar{width:auto; border-right:none; border-bottom:1px solid var(--line); max-height:38vh}
    .main{padding:18px 16px 56px}
  }
</style>
</head>
<body>

<!-- API key gate -->
<div id="apiGate" class="api-gate" role="dialog" aria-modal="true">
  <div class="api-card">
    <h2>Gemini APIキーの入力</h2>
    <p class="hint" style="margin:0 0 12px">無料のAPIキーは <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a> で取得できます。公開ページではなく、自分の端末で使ってください。</p>
    <label class="field-label" for="apiKeyInput">Gemini APIキー</label>
    <input type="password" id="apiKeyInput" autocomplete="off" placeholder="Gemini APIキー">
    <label class="remember"><input type="checkbox" id="rememberApiKey">この端末にAPIキーを保存する</label>
    <div id="apiKeyError" class="error"></div>
    <div class="btns">
      <button class="primary" onclick="saveApiKey()">保存して始める</button>
      <button class="ghost" onclick="clearApiKey()">保存済みキーを削除</button>
    </div>
  </div>
</div>

<div id="appShell" class="app-shell">
  <!-- Sidebar: list of やりたいこと -->
  <aside class="sidebar">
    <div class="brand">FirstStep</div>
    <button class="newbtn" onclick="focusNewGoal()">＋ 新しいやりたいこと</button>
    <div class="side-label">やりたいこと</div>
    <div id="goalList" class="goal-list"></div>
  </aside>

  <!-- Main: new-goal input + selected goal's TODO -->
  <main class="main">
    <div class="main-inner">
      <div class="top-row">
        <div>
          <h1 class="hero">FirstStep</h1>
          <div class="hero-sub">大きな目標を、最初の一歩に</div>
        </div>
        <button class="linkbtn" onclick="openApiGate()">APIキーを変更</button>
      </div>
      <p class="lead">やりたいことを入れると、AIが段階に分解。各段階から最初の2分でできる一歩を出せます。</p>

      <div class="newgoal" id="newGoal">
        <div class="field g-goal">
          <label class="field-label" for="goalInput">やりたいこと</label>
          <input type="text" id="goalInput" placeholder="例：就活を進めたい">
        </div>
        <div class="field g-dl">
          <label class="field-label" for="goalDeadline">期限（任意）</label>
          <input type="text" id="goalDeadline" placeholder="例：今週金曜">
        </div>
        <button class="primary" id="createBtn" onclick="genGoal()">作成</button>
      </div>
      <div id="createError" class="error"></div>

      <div id="detail"></div>

      <details class="debug-only">
        <summary>送信プロンプト</summary>
        <textarea id="prompt" readonly style="width:100%;min-height:200px;font-size:12px"></textarea>
      </details>
    </div>
  </main>
</div>

<!-- Focus (最初の一歩＋タイマー) -->
<div id="focus">
  <button class="quit" onclick="quitFocus()">やめる</button>
  <div class="fs-task" id="fsTask"></div>
  <div class="stepnow" id="stepnow"></div>
  <div class="action" id="action"></div>
  <div class="next-hint" id="nextHint"></div>
  <div class="encouragement" id="encouragement"></div>
  <div class="timer" id="timer">02:00</div>
  <div class="timerlabel" id="timerlabel"></div>
  <div class="fbtns">
    <button class="done-btn" onclick="nextStep(true)">できた ✓</button>
    <button class="add-btn" onclick="addMin()">＋1分</button>
  </div>
</div>

<script>
function esc(s){return (s||"").trim();}
function $(id){return document.getElementById(id);}
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
function escapeAttr(s){return escapeHtml(s).replace(/`/g,"&#96;");}
function setError(id, message){
  const el=$(id);
  if(!el) return;
  if(!message){ el.textContent=""; el.classList.remove('show'); return; }
  el.innerHTML='<span>'+escapeHtml(message)+'</span><button type="button" class="error-close" aria-label="エラーを閉じる" onclick="clearError(\''+id+'\')">×</button>';
  el.classList.add('show');
}
function clearError(id){ const el=$(id); if(el){ el.textContent=""; el.classList.remove('show'); } }
function parseJson(text){
  let t=(text||"").trim();
  t=t.replace(/^```[a-zA-Z]*\s*/,'').replace(/```\s*$/,'').trim();
  const s=t.indexOf('{'), e=t.lastIndexOf('}');
  if(s>=0 && e>s){ t=t.slice(s, e+1); }
  return JSON.parse(t);
}

const API_KEY_STORAGE_KEY = "geminiApiKey";
const GOALS_STORAGE_KEY = "firstStepGoals";
const GEMINI_MODEL = "gemini-3.5-flash";
const DEBUG_MODE = new URLSearchParams(location.search).get("debug") === "1";
const MEMO_TEMPLATE = "やったこと:\n分かったこと:\n困ったこと:";

let goals = [];
let currentId = null;
let openTodos = new Set();
let newGoalMode = false;

/* ---------- API key ---------- */
function getApiKey(){
  try{
    return sessionStorage.getItem(API_KEY_STORAGE_KEY) || localStorage.getItem(API_KEY_STORAGE_KEY) || "";
  }catch(e){
    try{ return localStorage.getItem(API_KEY_STORAGE_KEY) || ""; }catch(err){ return ""; }
  }
}
function setApiKeyError(m){ setError('apiKeyError', m); }
function openApiGate(){
  $('apiKeyInput').value=getApiKey();
  try{ $('rememberApiKey').checked=!!localStorage.getItem(API_KEY_STORAGE_KEY); }catch(e){ $('rememberApiKey').checked=false; }
  setApiKeyError("");
  $('apiGate').classList.add('show');
  document.body.classList.remove('api-ready');
  setTimeout(function(){$('apiKeyInput').focus();},0);
}
function closeApiGate(){ $('apiGate').classList.remove('show'); document.body.classList.add('api-ready'); }
function saveApiKey(){
  const k=esc($('apiKeyInput').value);
  if(!k){ setApiKeyError("Gemini APIキーを入力してください。"); return; }
  try{
    sessionStorage.setItem(API_KEY_STORAGE_KEY,k);
    if($('rememberApiKey').checked){ localStorage.setItem(API_KEY_STORAGE_KEY,k); }
    else { localStorage.removeItem(API_KEY_STORAGE_KEY); }
    closeApiGate();
  }catch(e){
    setApiKeyError("APIキーの保存に失敗しました。ブラウザの保存設定を確認してください。");
  }
}
function clearApiKey(){
  try{ sessionStorage.removeItem(API_KEY_STORAGE_KEY); localStorage.removeItem(API_KEY_STORAGE_KEY); }catch(e){}
  $('apiKeyInput').value="";
  $('rememberApiKey').checked=false;
  openApiGate();
  setApiKeyError("保存済みのキーを削除しました。");
}
function initApiGate(){ if(getApiKey()){ closeApiGate(); } else { openApiGate(); } }

/* ---------- Gemini ---------- */
async function callGemini(promptText, options){
  const apiKey = getApiKey();
  if(!apiKey){ openApiGate(); throw new Error("Gemini APIキーが未保存です。"); }
  const body = { contents: [{ parts: [{ text: promptText }] }] };
  if(options && options.json){ body.generationConfig = { response_mime_type: "application/json" }; }
  let res;
  try{
    res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/" + GEMINI_MODEL + ":generateContent?key=" + encodeURIComponent(apiKey), {
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
    });
  }catch(e){ throw new Error("通信に失敗しました。ネットワークを確認してください。"); }
  let data=null; try{ data=await res.json(); }catch(e){}
  if(!res.ok){
    const rawMessage=data&&data.error&&data.error.message?data.error.message:"";
    const m=rawMessage?"（"+rawMessage+"）":"";
    const err=new Error("Gemini APIエラー。キー・利用上限・通信を確認してください。"+m);
    const retryMatch=rawMessage.match(/retry in\s+([\d.]+)s/i);
    if(retryMatch){ err.retryDelayMs=Math.ceil(parseFloat(retryMatch[1])*1000)+1000; }
    if(data&&data.error&&Array.isArray(data.error.details)){
      data.error.details.forEach(function(d){
        if(d&&d.retryDelay){
          const secMatch=String(d.retryDelay).match(/([\d.]+)s/);
          if(secMatch){ err.retryDelayMs=Math.ceil(parseFloat(secMatch[1])*1000)+1000; }
        }
      });
    }
    throw err;
  }
  const text = data&&data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text;
  if(!text){
    const reason=data&&data.candidates&&data.candidates[0]&&data.candidates[0].finishReason;
    throw new Error("Geminiから回答を取得できませんでした。"+(reason?"（finishReason: "+reason+"）":""));
  }
  return text;
}
function calmError(detail){ return detail ? ("失敗しました："+detail) : "失敗しました。少し時間をおいて再度お試しください。"; }

/* ---------- rate limiter (≤ RPM / 60s) + auto retry ---------- */
function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }
const RPM_LIMIT = 13; // 無料枠15/分に余裕を持たせる
let _callTimes = [];
async function rateGate(){
  for(;;){
    const now = Date.now();
    _callTimes = _callTimes.filter(function(t){ return now - t < 60000; });
    if(_callTimes.length < RPM_LIMIT){ _callTimes.push(now); return; }
    await sleep(60000 - (now - _callTimes[0]) + 80);
  }
}
async function callGeminiRL(prompt, opts, tries){
  tries = tries || 0;
  await rateGate();
  try{
    return await callGemini(prompt, opts);
  }catch(e){
    const msg = (e && e.message) || "";
    if(tries < 3 && /429|RESOURCE_EXHAUSTED|quota|rate|exhaust/i.test(msg)){
      await sleep(e.retryDelayMs || (8000 + tries*10000));
      return callGeminiRL(prompt, opts, tries+1);
    }
    throw e;
  }
}

/* ---------- persistence ---------- */
function saveGoals(){ try{ localStorage.setItem(GOALS_STORAGE_KEY, JSON.stringify({goals:goals, currentId:currentId})); }catch(e){} }
function loadGoals(){
  let raw=""; try{ raw=localStorage.getItem(GOALS_STORAGE_KEY)||""; }catch(e){ return; }
  if(!raw) return;
  try{
    const p=JSON.parse(raw);
    if(p&&Array.isArray(p.goals)){
      goals=p.goals.map(function(g){ return { id:g.id||uid(), title:esc(g.title), deadline:esc(g.deadline), todos:normalizeTodos(g.todos)||[] }; }).filter(function(g){return g.title;});
      currentId = p.currentId && goals.some(function(g){return g.id===p.currentId;}) ? p.currentId : (goals[0]?goals[0].id:null);
    }
  }catch(e){}
}
function uid(){ return "g"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function memoForPrompt(memo){
  const lines=String(memo||"").split(/\r?\n/).map(function(line){return line.trim();}).filter(Boolean);
  const useful=lines.filter(function(line){
    return !/^やったこと[:：]\s*$/.test(line) &&
           !/^分かったこと[:：]\s*$/.test(line) &&
           !/^困ったこと[:：]\s*$/.test(line);
  });
  return useful.join("\n");
}

function normalizeTodos(raw){
  if(!Array.isArray(raw)) return null;
  const c=raw.map(function(t){
    const o={ title:esc(t&&t.title), note:esc(t&&t.note), memo:esc(t&&t.memo), done:!!(t&&t.done) };
    if(t&&t.firstStep){
      const fs={ action:esc(t.firstStep.action), nextHint:esc(t.firstStep.nextHint), encouragement:esc(t.firstStep.encouragement) };
      if(fs.action){ o.firstStep=fs; }
    }
    if(t&&Array.isArray(t.steps)){
      const st=t.steps.map(function(s){ return {action:esc(s&&s.action), minutes:Math.max(1,parseInt(s&&s.minutes)||2)}; }).filter(function(s){return s.action;});
      if(st.length){ o.steps=st; o.enc=esc(t.enc); }
    }
    return o;
  }).filter(function(t){return t.title;});
  return c.length?c:[];
}

/* ---------- goals: create / select / delete ---------- */
function setNewGoal(on){
  newGoalMode = on;
  $('newGoal').style.display = on ? 'flex' : 'none';
  $('createError').classList.remove('show');
  if(on){ currentId=null; $('goalInput').value=""; $('goalDeadline').value=""; renderSidebar(); renderDetail(); setTimeout(function(){ $('goalInput').focus(); },0); }
}
function focusNewGoal(){ setNewGoal(true); }

async function genGoal(){
  const goal = esc($('goalInput').value);
  const deadline = esc($('goalDeadline').value);
  clearError('createError');
  if(!goal){ setError('createError', "やりたいことを入力してください。"); return; }
  const ctx = deadline ? ("【補足情報】\n- 締切："+deadline+"\n\n") : "";
  const prompt =
"あなたは、大きな「やりたいこと」を、達成までの大枠の段階（フェーズ／マイルストーン）に分ける支援コーチです。\n"+
"目的は、全体の見通しを持てるように、ゴールまでの道のりを大きな段階に区切ることです。細かい作業までは刻みません（細分化は各段階から後で行います）。\n\n"+
"【やりたいこと】\n"+goal+"\n\n"+ctx+
"【段階（TODO）の条件（厳守）】\n"+
"1. 日本語で書く。\n"+
"2. 各TODOは『まとまった段階（フェーズ）』にする。例：アプリ開発なら「1. 何を作るか決める → 2. 要件定義 → 3. 実装 → 4. リリース」。\n"+
"3. 2分で終わる細かい作業（ファイルを1つ開く等）は入れない。\n"+
"4. titleは段階の名前を短く。noteはその段階で何をするかを1行で。\n"+
"5. 着手する順に4〜6段階へ分ける。\n"+
"6. 口調はやさしく、不安をあおらない。\n\n"+
"【出力形式】次のJSONのみを返す。コードブロックや前置きは付けない。\n"+
'{ "todos": [ { "title": "...", "note": "..." }, ... ] }';

  const btn=$('createBtn'); const old=btn.textContent; btn.disabled=true; btn.textContent="作成中...";
  try{
    if(DEBUG_MODE) $('prompt').value=prompt;
    const text=await callGeminiRL(prompt,{json:true});
    let parsed; try{ parsed=parseJson(text); }catch(e){ throw new Error("JSONを読み込めませんでした。もう一度試してください。"); }
    const todos=normalizeTodos(parsed&&parsed.todos);
    if(!todos||!todos.length){ throw new Error("回答の形式が合いませんでした。"); }
    const g={ id:uid(), title:goal, deadline:deadline, todos:todos };
    goals.unshift(g);
    currentId=g.id; openTodos=new Set();
    $('goalInput').value=""; $('goalDeadline').value="";
    newGoalMode=false; $('newGoal').style.display='none';
    saveGoals(); renderAll();
  }catch(e){
    setError('createError', calmError(e&&e.message));
  }finally{ btn.disabled=false; btn.textContent=old; }
}

function selectGoal(id){ newGoalMode=false; $('newGoal').style.display='none'; currentId=id; openTodos=new Set(); saveGoals(); renderAll(); }
function deleteGoal(id){
  if(!confirm("このやりたいことを削除しますか？")) return;
  goals=goals.filter(function(g){return g.id!==id;});
  if(currentId===id){ currentId=goals[0]?goals[0].id:null; openTodos=new Set(); }
  saveGoals(); renderAll();
}
function currentGoal(){ return goals.find(function(g){return g.id===currentId;})||null; }

/* ---------- render ---------- */
function renderAll(){ renderSidebar(); renderDetail(); }

function renderSidebar(){
  const list=$('goalList');
  if(!goals.length){ list.innerHTML='<div class="side-empty">まだありません。「新しいやりたいこと」から作成してください。</div>'; return; }
  list.innerHTML=goals.map(function(g){
    const sub=(g.deadline?("期限 "+escapeHtml(g.deadline)+" ・ "):"")+g.todos.length+"段階";
    const id=escapeAttr(g.id);
    return '<div class="goal-item'+(g.id===currentId?' active':'')+'" data-sel="'+id+'">'+
      '<div class="goal-main" data-sel="'+id+'">'+
        '<div class="goal-title">'+escapeHtml(g.title)+'</div>'+
        '<div class="goal-sub">'+sub+'</div>'+
      '</div>'+
      '<button class="goal-del" data-del="'+id+'" title="削除" aria-label="'+escapeAttr(g.title)+'を削除">🗑</button>'+
    '</div>';
  }).join("");
  list.querySelectorAll('[data-sel]').forEach(function(el){ el.addEventListener('click',function(e){ if(e.target.closest('[data-del]'))return; selectGoal(el.getAttribute('data-sel')); }); });
  list.querySelectorAll('[data-del]').forEach(function(b){ b.addEventListener('click',function(e){ e.stopPropagation(); deleteGoal(b.getAttribute('data-del')); }); });
}

function renderDetail(){
  const d=$('detail'); const g=currentGoal();
  if(!g){ d.innerHTML='<div class="empty-note">左の一覧からやりたいことを選ぶか、上で新しく作成してください。</div>'; return; }
  const sub=(g.deadline?("期限："+escapeHtml(g.deadline)+" ・ "):"")+g.todos.length+"段階";
  let html='<div class="detail-title">'+escapeHtml(g.title)+'</div><div class="detail-sub">'+sub+'</div>';
  html+='<div class="todo-list">'+g.todos.map(function(t,i){
    const open=openTodos.has(i);
    const idx=escapeAttr(i);
    return '<div class="todo-card'+(t.done?' done':'')+(open?' open':'')+'">'+
      '<div class="todo-head">'+
        '<input type="checkbox" class="todo-check" data-done="'+idx+'" aria-label="'+escapeAttr(t.title)+'を完了にする"'+(t.done?' checked':'')+'>'+
        '<span class="todo-num">'+(i+1)+'</span>'+
        '<h3 data-toggle="'+idx+'">'+escapeHtml(t.title)+'</h3>'+
        '<button class="todo-toggle" data-toggle="'+idx+'" aria-label="'+escapeAttr(t.title)+'の詳細">▶</button>'+
      '</div>'+
      '<div class="todo-details">'+
        '<p class="todo-note">'+escapeHtml(t.note||"この段階から着手します。")+'</p>'+
        '<label class="memo-label" for="memo-'+idx+'">メモ</label>'+
        '<textarea id="memo-'+idx+'" class="todo-memo" data-memo="'+idx+'">'+escapeHtml(t.memo||MEMO_TEMPLATE)+'</textarea>'+
        '<div><button class="ghost" data-first="'+idx+'">'+(t.firstStep?'最初の一歩を見る':'最初の一歩を出す')+'</button>'+
        (t.firstStep?'<button class="dev-reset" data-reset-first="'+idx+'" title="生成済みFirstStepをリセット">リセット</button>':'')+'</div>'+
      '</div>'+
    '</div>';
  }).join("")+'</div>';
  d.innerHTML=html;

  d.querySelectorAll('[data-toggle]').forEach(function(el){ el.addEventListener('click',function(){ const i=Number(el.getAttribute('data-toggle')); if(openTodos.has(i))openTodos.delete(i); else openTodos.add(i); const c=el.closest('.todo-card'); if(c)c.classList.toggle('open'); }); });
  d.querySelectorAll('[data-done]').forEach(function(inp){ inp.addEventListener('change',function(){ const i=Number(inp.getAttribute('data-done')); const gg=currentGoal(); if(gg&&gg.todos[i]){ gg.todos[i].done=inp.checked; saveGoals(); const c=inp.closest('.todo-card'); if(c)c.classList.toggle('done',inp.checked); renderSidebar(); } }); });
  d.querySelectorAll('[data-memo]').forEach(function(area){ area.addEventListener('input',function(){ const i=Number(area.getAttribute('data-memo')); const gg=currentGoal(); if(gg&&gg.todos[i]){ gg.todos[i].memo=area.value; saveGoals(); } }); });
  d.querySelectorAll('[data-first]').forEach(function(btn){ btn.addEventListener('click',function(){ const i=Number(btn.getAttribute('data-first')); const gg=currentGoal(); if(!gg||!gg.todos[i])return; const todo=gg.todos[i]; if(todo.firstStep){ showFirstStep(todo, gg.title); return; } const old=btn.textContent; btn.disabled=true; btn.textContent="考え中..."; genFirstStep(gg, i).finally(function(){ btn.disabled=false; btn.textContent=old; renderDetail(); }); }); });
  d.querySelectorAll('[data-reset-first]').forEach(function(btn){ btn.addEventListener('click',function(){ const i=Number(btn.getAttribute('data-reset-first')); const gg=currentGoal(); if(!gg||!gg.todos[i])return; if(!confirm("このFirstStepをリセットしますか？"))return; delete gg.todos[i].firstStep; saveGoals(); renderDetail(); }); });
}

/* ---------- first step (JSON steps -> focus) ---------- */
let STEPS=[], fsIdx=0, remaining=0, tickId=null, fsMeta={}, fsLabel="";

function previousContext(goal, todoIndex){
  if(!goal || !Array.isArray(goal.todos) || todoIndex<=0) return "";
  const prev=goal.todos.slice(0,todoIndex).map(function(t,i){
    let line=(i+1)+". "+esc(t.title);
    if(t.note) line+=" / 説明: "+esc(t.note);
    const memo=memoForPrompt(t.memo);
    if(memo) line+=" / ユーザーメモ: "+memo.slice(0,220);
    if(t.done) line+=" / 状態: 完了";
    if(t.firstStep&&t.firstStep.action) line+=" / 提案済みFirstStep: "+esc(t.firstStep.action);
    if(t.firstStep&&t.firstStep.nextHint) line+=" / 次ヒント: "+esc(t.firstStep.nextHint);
    return line;
  });
  return prev.length ? prev.join("\n") : "";
}

function buildStepsPrompt(task, deadline, goalTitle, phaseNote, currentMemo, prevContext){
  let ctx="";
  if(goalTitle) ctx+="- 全体の目標："+goalTitle+"\n";
  if(prevContext) ctx+="- 前の段階（参考。実行済みとは限らない）:\n"+prevContext+"\n";
  ctx+="- 今取り組む段階："+task+"\n";
  if(phaseNote) ctx+="- この段階の説明："+phaseNote+"\n";
  currentMemo=memoForPrompt(currentMemo);
  if(currentMemo) ctx+="- この段階のユーザーメモ："+currentMemo.slice(0,220)+"\n";
  if(deadline) ctx+="- 締切："+deadline+"\n";
  return "あなたは、先延ばしに悩む人の『最初の一歩』を作る専門コーチです。\n"+
"与えられた段階（フェーズ）に、今すぐ2分だけ取り組める『最初の一歩』を1つだけ作ります。\n"+
"目的は、タスクを完了させることではなく、次に続けやすい小さな痕跡を残すことです。\n\n"+
"【入力】\n"+ctx+"\n"+
"【最初の一歩の条件（厳守）】\n"+
"1. この段階の説明を最優先する。段階名だけを見て、目標設定・計画作成・現状を書く作業へ戻らない。\n"+
"2. 前の段階は流れをつかむ参考情報として使う。ただし、ユーザーが実行済みとは限らないので結果を断定しない。\n"+
"3. 入力に明示されていない対象・分野・方法・教材・ツール・弱点・結果を推測しない。\n"+
"4. 前のFirstStepは提案であり、実行結果ではない。そこからユーザーの状態・弱点・好み・進捗を断定しない。\n"+
"5. ユーザーメモは実際の観察・結果として優先して参考にする。ただし、メモにないことは推測しない。\n"+
"6. 対象が未確定なら、特定の対象に進むのではなく、候補を1つ選ぶ・候補を1つ見つける・前回メモがあれば1つ拾う一歩にする。\n"+
"7. ただし『目標を書く』『計画を立てる』に戻りすぎず、今の段階に必要な対象選びに限定する。\n"+
"8. stepは2分で区切れる単一動作にする。『Aして、Bして、Cする』のように複数動作を連結しない。\n"+
"9. stepは『まずは〜してみましょう』のような、提案しながら寄り添う口調にする。\n"+
"10. stepは、この段階の本来の作業列に実際に入る行動にする。準備の準備ではなく、成果に近い入口へ進める。\n"+
"11. stepは『動詞＋具体物＋小さな到達条件』で書く。画面・紙・ファイル上に1語、1文、1項目、1件などの痕跡が残る行動にする。\n"+
"12. 『開くだけ』『眺めるだけ』は小さすぎるので避ける。ただし、開いた後に検索語を入れる、1語だけ書く、1件だけ貼る等ならよい。\n"+
"13. 『検索して読む』『調べてまとめる』『資料を完成させる』のような大きい作業は禁止。調べる場合は、検索語を1つ入力する、結果タイトルを1つ貼る等に絞る。\n"+
"14. nextHintはstepが終わった後の薄いヒント。必須作業ではなく、『次は〜してみると続けやすいです』のように短く書く。\n"+
"15. nextHintも小さな単一動作にする。stepより少し先へ進むが、急かさない。\n"+
"16. 締切があれば踏まえる。\n\n"+
"【粒度の例】\n"+
"- 対象が明確な場合：『まずはブラウザで「SPI 模擬試験 無料」と検索して、受験できそうなサイトを1つ開いてみましょう』\n"+
"- 対象が未確定な場合：『まずは参考書の目次を開き、今日取り組む分野を1つだけ丸で囲んでみましょう』\n"+
"- 前回結果が未確定な場合：『まずは前回のメモがあれば、気になる項目を1つだけノートに写してみましょう』\n"+
"- 就活調査で業界が未確定な場合：『まずは求人サイトの検索欄に、気になる業界名を1つだけ入れてみましょう』\n"+
"- 小さすぎるstep：『Googleドキュメントを開く』\n"+
"- 決め打ちしすぎるstep：『まずは数学の公式を1つ書き写してみましょう』（数学が対象と明示されていない場合）\n"+
"- 大きすぎるstep：『記事を読んで特徴を3つメモする』\n\n"+
"【内部手順】この段階の説明から本来の作業列を推定し、その最初の2分に入る候補を考える。未確定の対象・分野・方法を勝手に補っていないか確認する。最も着手しやすい1つを選び、『説明文からズレていないか／決め打ちしていないか／2分で区切れるか／単一動作か／小さな痕跡が残るか／口調が寄り添っているか』を自己点検して整えてから出力。\n\n"+
"【出力形式】次のJSONのみ。コードブロックや前置きは付けない。\n"+
'{ "step": "まずは具体的な最初の一歩をしてみましょう", "nextHint": "次は小さな続きの行動をしてみると続けやすいです", "minutes": 2, "encouragement": "着手を後押しする短い一言" }';
}

function showFirstStep(todo, goalTitle){
  fsLabel = (goalTitle ? goalTitle + " ／ " : "") + todo.title;
  const fs=todo.firstStep||{};
  STEPS=[{ action:esc(fs.action), minutes:2, nextHint:esc(fs.nextHint) }];
  fsMeta={encouragement:esc(fs.encouragement)};
  fsIdx=0;
  startFocus();
}

/* 押したときにその場で生成（オンデマンド） */
async function genFirstStep(goal, todoIndex){
  try{
    const todo=goal.todos[todoIndex];
    fsLabel = (goal.title ? goal.title + " ／ " : "") + todo.title;
    const text=await callGeminiRL(buildStepsPrompt(todo.title, goal.deadline, goal.title, todo.note, todo.memo, previousContext(goal, todoIndex)), {json:true});
    let parsed; try{ parsed=parseJson(text); }catch(e){ throw new Error("JSONを読み込めませんでした。もう一度試してください。"); }
    // 新形式 {step,nextHint} と旧形式 {steps:[...]} の両方に対応、必ず1つに絞る
    let action = esc(parsed && parsed.step);
    let nextHint = esc(parsed && parsed.nextHint);
    if(!action && parsed && Array.isArray(parsed.steps) && parsed.steps[0]){ action=esc(parsed.steps[0].action); }
    if(!action){ throw new Error("回答の形式が合いませんでした。"); }
    todo.firstStep={ action:action, nextHint:nextHint, encouragement:esc(parsed&&parsed.encouragement) };
    saveGoals();
    showFirstStep(todo, goal.title);
  }catch(e){
    setError('createError', calmError(e&&e.message));
  }
}

function startFocus(){ $('fsTask').textContent = fsLabel || ""; $('focus').classList.add('show'); showStep(); }
function showStep(){
  const s=STEPS[fsIdx];
  $('stepnow').textContent="▶ 最初の一歩（2分だけ）";
  $('action').textContent=s.action;
  $('nextHint').textContent=s.nextHint || "";
  $('encouragement').textContent=fsMeta.encouragement || "";
  setTimer(s.minutes*60);
}
function setTimer(sec){
  clearInterval(tickId); remaining=sec; $('timer').classList.remove('done'); $('timerlabel').textContent=""; renderTimer();
  tickId=setInterval(function(){ remaining--; if(remaining<=0){ remaining=0; renderTimer(); clearInterval(tickId); tickId=null; $('timer').classList.add('done'); $('timerlabel').textContent="⏰ 時間です。区切りがついたら「できた」を押そう"; } else renderTimer(); },1000);
}
function renderTimer(){ const m=String(Math.floor(remaining/60)).padStart(2,'0'), s=String(remaining%60).padStart(2,'0'); $('timer').textContent=m+":"+s; }
function addMin(){ setTimer(remaining+60); }
function nextStep(){ clearInterval(tickId); tickId=null; fsIdx++; if(fsIdx>=STEPS.length){ finishFocus(); } else { showStep(); } }
function quitFocus(){ clearInterval(tickId); tickId=null; $('focus').classList.remove('show'); }
function finishFocus(){ clearInterval(tickId); tickId=null; $('focus').classList.remove('show'); }

/* ---------- init ---------- */
document.body.classList.toggle("debug", DEBUG_MODE);
loadGoals();
renderAll();
if(!goals.length){ setNewGoal(true); }
initApiGate();
</script>
</body>
